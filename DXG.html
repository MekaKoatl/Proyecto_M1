<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <!-- Style Sheet Propia y Conexión con Tailwind -->
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fin Stylesheets -->
  </head>
  <!-- Favicon -->
  <link
    href="data:image/x-icon;base64,AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAgAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAx8f/AMzMzAD///8AHR21ACIi4AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAMzMzMzMzIiIzMzMzMzMyIjMzMzMzMzIiMzMzMAMzMyIzMzMAADMzIjMzMAMwAzMiAAAAMAMAAAAAAAAwAwAAAFVVUAMwBVVEVVVVAABVVURVVVVQBVVVRFFVVVVVVVVEUVVVVVVVVURVFVVVVVVURFVRFVVVVUREVVVVVVVUREQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    rel="icon"
    type="image/x-icon"
  />
  <!-- Color de fondo -->
  <body class="bg-white-900 text-white min-h-screen">
    <!-- Navbar -->
    <nav class="bg-red-600 shadow-lg">
      <div
        class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between"
      >
        <!-- Logo -->
        <div class="flex items-center gap-3">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Pok%C3%A9_Ball_icon.svg/1280px-Pok%C3%A9_Ball_icon.svg.png"
            alt="Pokeball"
            class="w-8 h-8"
          />
          <h1 class="text-lg sm:text-2xl font-bold tracking-wide">
            CRAF Pokédex - Project
          </h1>
        </div>

        <!-- Nav Links -->
        <ul
          class="flex items-center gap-1 sm:gap-4 text-sm sm:text-base font-semibold"
        >
          <li>
            <a
              href="index.html"
              class="px-3 py-1 rounded hover:bg-red-700 transition"
              >Home</a
            >
          </li>
          <li>
            <a
              href="DXG.html"
              class="px-3 py-1 rounded hover:bg-red-700 transition"
              >General Dex Gallery</a
            >
          </li>
        </ul>
      </div>
    </nav>
    <!-- Fin Navbar -->

    <!-- Buscador Meowth así es -->
    <div class="max-w-7xl mx-auto px-4 pt-6">
      <div class="flex gap-2">
        <input
          id="pokemon-search"
          type="text"
          placeholder="Search Pokémon by name..."
          class="w-full px-4 py-2 border border-gray-300 rounded-lg text-gray-700 text-sm focus:outline-none focus:border-red-400"
        />
        <button
          id="clear-search-btn"
          class="px-4 py-2 bg-gray-200 text-gray-700 font-semibold rounded-lg hover:bg-gray-300 transition text-sm"
        >
          Clear
        </button>
      </div>
    </div>

    <!-- Filters -------------------------------------------------------------------------->
    <div id="filters" class="max-w-7xl mx-auto px-4 pt-6 text-gray-700">
      <div
        class="flex flex-col gap-4 bg-gray-50 border border-gray-200 rounded-lg p-4"
      >
        <!-- Type -->
        <div>
          <h3 class="font-bold mb-2 text-sm uppercase tracking-wide">Type</h3>
          <div id="filter-types" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Region -->
        <div>
          <h3 class="font-bold mb-2 text-sm uppercase tracking-wide">Region</h3>
          <div id="filter-regions" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Generation -->
        <div>
          <h3 class="font-bold mb-2 text-sm uppercase tracking-wide">
            Generation
          </h3>
          <div id="filter-gens" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Name Initial -->
        <div>
          <h3 class="font-bold mb-2 text-sm uppercase tracking-wide">
            Name starts with
          </h3>
          <div id="filter-letters" class="flex flex-wrap gap-1"></div>
        </div>

        <!-- Evolutions -->
        <div>
          <h3 class="font-bold mb-2 text-sm uppercase tracking-wide">
            Evolution chain size
          </h3>
          <div id="filter-evos" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-2 mt-2">
          <button
            id="apply-filters-btn"
            class="px-4 py-2 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 transition text-sm"
          >
            Apply Filters
          </button>
          <button
            id="clear-filters-btn"
            class="px-4 py-2 bg-gray-200 text-gray-700 font-semibold rounded-lg hover:bg-gray-300 transition text-sm"
          >
            Clear
          </button>
        </div>
      </div>
    </div>

    <!-- General Gallery ------------------------------------------------------------->
    <section class="max-w-7xl mx-auto px-4 py-8">
      <!-- Grid todopoderoso -->
      <div
        id="dex-grid"
        class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4"
      >
        <!-- Cards con js? -->
      </div>

      <!-- boton -->
      <div class="flex justify-center mt-8">
        <button
          id="load-more-btn"
          class="px-6 py-2 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 transition"
        >
          Load More
        </button>
      </div>
    </section>

    <!-- Botonsito -->
    <button
      id="back-to-top"
      class="fixed bottom-6 right-6 z-50 w-10 h-10 bg-red-600 text-white rounded-full shadow-lg items-center justify-center text-xl hover:bg-red-700 transition hidden"
    >
      ↑
    </button>

    <!-- Conexión con js propia -->
    <script src="scripts.js"></script>
  </body>
</html>
