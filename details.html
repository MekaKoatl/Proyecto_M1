<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <!-- Style Sheet Propia y Conexión con Tailwind -->
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fin Stylesheets -->
  </head>
  <!-- Favicon -->
  <link
    href="data:image/x-icon;base64,AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAgAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAx8f/AMzMzAD///8AHR21ACIi4AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAMzMzMzMzIiIzMzMzMzMyIjMzMzMzMzIiMzMzMAMzMyIzMzMAADMzIjMzMAMwAzMiAAAAMAMAAAAAAAAwAwAAAFVVUAMwBVVEVVVVAABVVURVVVVQBVVVRFFVVVVVVVVEUVVVVVVVVURVFVVVVVVURFVRFVVVVUREVVVVVVVUREQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    rel="icon"
    type="image/x-icon"
  />
  <!-- Color de fondo -->
  <body class="bg-white-900 text-white min-h-screen">
    <!-- Navbar -->
    <nav class="bg-red-600 shadow-lg">
      <div
        class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between"
      >
        <!-- Logo -->
        <div class="flex items-center gap-3">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Pok%C3%A9_Ball_icon.svg/1280px-Pok%C3%A9_Ball_icon.svg.png"
            alt="Pokeball"
            class="w-8 h-8"
          />
          <h1 class="text-lg sm:text-2xl font-bold tracking-wide">
            CRAF Pokédex - Project
          </h1>
        </div>
        <!-- Nav Links -->
        <ul
          class="flex items-center gap-1 sm:gap-4 text-sm sm:text-base font-semibold"
        >
          <li>
            <a
              href="index.html"
              class="px-3 py-1 rounded hover:bg-red-700 transition"
              >Home</a
            >
          </li>
          <li>
            <a
              href="DXG.html"
              class="px-3 py-1 rounded hover:bg-red-700 transition"
              >General Dex Gallery</a
            >
          </li>
        </ul>
      </div>
    </nav>
    <!-- Fin Navbar -->

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
      <!-- Esto carga la info -->
      <div class="flex items-start gap-6 mb-6">
        <button
          onclick="history.back()"
          class="mt-2 text-gray-500 hover:text-red-600 transition font-semibold text-sm"
        >
          ← Return
        </button>
        <div>
          <h1 id="detail-name" class="text-3xl font-bold text-gray-900"></h1>
          <p id="detail-genus" class="text-lg text-gray-500 mt-1"></p>
        </div>
      </div>

      <!-- Sprites -->
      <div class="flex gap-4 mb-8">
        <div
          class="flex-1 bg-gray-100 rounded-xl flex items-center justify-center"
          style="min-height: 300px"
        >
          <img
            id="sprite-main"
            src=""
            alt=""
            class="w-64 h-64 object-contain"
          />
        </div>
        <div class="grid grid-cols-3 gap-2 content-start">
          <div id="sprite-gallery" class="contents"></div>
        </div>
      </div>

      <hr class="border-gray-200 mb-6" />

      <!-- Types / Gen / Habitat -->
      <div class="grid grid-cols-3 gap-4 mb-8">
        <div class="bg-gray-50 border border-gray-200 rounded-xl p-4">
          <h3
            class="text-xs font-bold uppercase tracking-wide text-gray-400 mb-2"
          >
            Type
          </h3>
          <div id="detail-types" class="flex flex-wrap gap-2"></div>
        </div>

        <div class="bg-gray-50 border border-gray-200 rounded-xl p-4">
          <h3
            class="text-xs font-bold uppercase tracking-wide text-gray-400 mb-2"
          >
            Generation
          </h3>
          <div id="detail-generation" class="text-gray-700 text-sm"></div>
        </div>

        <div class="bg-gray-50 border border-gray-200 rounded-xl p-4">
          <h3
            class="text-xs font-bold uppercase tracking-wide text-gray-400 mb-2"
          >
            Habitat
          </h3>
          <p id="detail-habitat" class="text-gray-700 text-sm capitalize"></p>
        </div>
      </div>

      <hr class="border-gray-200 mb-6" />

      <!-- Evolution -->
      <div class="grid grid-cols-3 gap-4 items-center mb-8">
        <div
          id="detail-evolves-from"
          class="bg-gray-50 border border-gray-200 rounded-xl p-4 text-center"
        >
          <h3
            class="text-xs font-bold uppercase tracking-wide text-gray-400 mb-2"
          >
            Evolves From
          </h3>
          <p class="text-gray-400 text-sm">—</p>
        </div>

        <div class="flex flex-col items-center">
          <img id="sprite-evo" src="" alt="" class="w-24 h-24 object-contain" />
          <p
            id="detail-evo-name"
            class="text-sm font-semibold text-gray-700 mt-1"
          ></p>
        </div>

        <div
          id="detail-evolves-to"
          class="bg-gray-50 border border-gray-200 rounded-xl p-4 text-center"
        >
          <h3
            class="text-xs font-bold uppercase tracking-wide text-gray-400 mb-2"
          >
            Evolves To
          </h3>
          <p class="text-gray-400 text-sm">—</p>
        </div>
      </div>

      <hr class="border-gray-200 mb-6" />

      <!-- Sabor -->
      <div class="bg-gray-50 border border-gray-200 rounded-xl p-6 mb-8">
        <h3
          class="text-xs font-bold uppercase tracking-wide text-gray-400 mb-3"
        >
          Pokédex Entry
        </h3>
        <p id="detail-flavor" class="text-gray-700 text-sm leading-relaxed"></p>
      </div>
    </main>

    <!-- Conexión con js propia -->
    <script src="scripts.js"></script>
  </body>
</html>
