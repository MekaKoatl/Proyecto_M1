<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <!-- Style Sheet Propia y Conexión con Tailwind -->
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fin Stylesheets -->
  </head>
  <!-- Favicon -->
  <link
    href="data:image/x-icon;base64,AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAgAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAx8f/AMzMzAD///8AHR21ACIi4AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAMzMzMzMzIiIzMzMzMzMyIjMzMzMzMzIiMzMzMAMzMyIzMzMAADMzIjMzMAMwAzMiAAAAMAMAAAAAAAAwAwAAAFVVUAMwBVVEVVVVAABVVURVVVVQBVVVRFFVVVVVVVVEUVVVVVVVVURVFVVVVVVURFVRFVVVVUREVVVVVVVUREQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    rel="icon"
    type="image/x-icon"
  />
  <!-- Color de fondo -->
  <body class="bg-white-900 text-white min-h-screen">
    <!-- Navbar -->
    <nav class="bg-red-600 shadow-lg">
      <div
        class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between"
      >
        <!-- Logo -->
        <div class="flex items-center gap-3">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Pok%C3%A9_Ball_icon.svg/1280px-Pok%C3%A9_Ball_icon.svg.png"
            alt="Pokeball"
            class="w-8 h-8"
          />
          <h1 class="text-lg sm:text-2xl font-bold tracking-wide">
            CRAF Pokédex - Project
          </h1>
        </div>
        <!-- Nav Links -->
        <ul
          class="flex items-center gap-1 sm:gap-4 text-sm sm:text-base font-semibold"
        >
          <li>
            <a
              href="index.html"
              class="px-3 py-1 rounded hover:bg-red-700 transition"
              >Home</a
            >
          </li>
          <li>
            <a
              href="DXG.html"
              class="px-3 py-1 rounded hover:bg-red-700 transition"
              >General Dex Gallery</a
            >
          </li>
        </ul>
      </div>
    </nav>
    <!-- Fin Navbar -->

    <!-- Carousel Section -->
    <section class="py-8 flex justify-center">
      <div class="carousel-wrapper">
        <div id="carousel-track" class="carousel-track"></div>
      </div>
    </section>

    <!-- Search Section -->
    <section class="max-w-7xl mx-auto px-4 py-8">
      <h2 class="text-2xl font-bold text-gray-900 mb-6">Pokémon Search</h2>
      <div class="flex gap-6">
        <!-- Filters Sidebar -->
        <div class="w-48 flex-shrink-0 text-gray-700">
          <div
            class="flex flex-col gap-3 bg-gray-50 border border-gray-200 rounded-lg p-3"
          >
            <div class="filter-section">
              <button
                class="index-filter-btn font-bold text-sm w-full text-left"
              >
                □ Type ▾
              </button>
              <div
                class="index-filter-dropdown hidden flex-col gap-1 mt-1 pl-2"
                id="filter-types"
              ></div>
            </div>

            <div class="filter-section">
              <button
                class="index-filter-btn font-bold text-sm w-full text-left"
              >
                □ Generation ▾
              </button>
              <div
                class="index-filter-dropdown hidden flex-col gap-1 mt-1 pl-2"
                id="filter-gens"
              ></div>
            </div>

            <div class="filter-section">
              <button
                class="index-filter-btn font-bold text-sm w-full text-left"
              >
                □ Region ▾
              </button>
              <div
                class="index-filter-dropdown hidden flex-col gap-1 mt-1 pl-2"
                id="filter-regions"
              ></div>
            </div>

            <button
              id="apply-filters-btn"
              class="px-3 py-1 bg-red-600 text-white text-sm font-semibold rounded-lg hover:bg-red-700 transition"
            >
              Apply
            </button>
            <button
              id="clear-filters-btn"
              class="px-3 py-1 bg-gray-200 text-gray-700 text-sm font-semibold rounded-lg hover:bg-gray-300 transition"
            >
              Clear
            </button>
          </div>
        </div>

        <!-- Search + Grid -->
        <div class="flex-1 flex flex-col gap-4">
          <input
            id="pokemon-search"
            type="text"
            placeholder="Search Pokémon by name..."
            class="w-full px-4 py-2 border border-gray-300 rounded-full text-gray-700 text-sm focus:outline-none focus:border-red-400"
          />
          <div id="dex-grid" class="grid grid-cols-3 gap-4"></div>
        </div>
      </div>
    </section>

    <button id="back-to-top" class="fixed bottom-6 right-6 z-50 w-10 h-10 bg-red-600 text-white rounded-full shadow-lg items-center justify-center text-xl hover:bg-red-700 transition hidden">
  ↑
</button>

    <!-- Conexión con js propia -->
    <script src="scripts.js"></script>
  </body>
</html>
